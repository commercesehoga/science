<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85C6F4"/>
      <stop offset="100%" stop-color="#858EF4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="18" fill="#F0F6FF"/>

  <!-- Soft Circle -->
  <circle cx="32" cy="32" r="20"
          fill="rgba(255,255,255,0.45)"/>

  <!-- Heart -->
  <path d="
    M32 50
    C12 38 10 24 18 18
    C24 13 30 16 32 22
    C34 16 40 13 46 18
    C54 24 52 38 32 50
  "
    fill="url(#heartGrad)"
    filter="url(#glow)"/>

  <!-- Small Shine -->
  <circle cx="24" cy="22" r="3"
          fill="rgba(255,255,255,0.7)"/>

</svg>
