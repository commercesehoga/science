<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <linearGradient id="chemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85C6F4"/>
      <stop offset="100%" stop-color="#858EF4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="18" fill="#F0F6FF"/>

  <!-- Soft Glow Circle -->
  <circle cx="32" cy="32" r="20"
          fill="rgba(255,255,255,0.45)"/>

  <!-- Flask -->
  <path d="
    M26 12
    H38
    M30 12
    V26
    L20 46
    A6 6 0 0 0 25 54
    H39
    A6 6 0 0 0 44 46
    L34 26
    V12
  "
    fill="none"
    stroke="url(#chemGrad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Liquid -->
  <path d="
    M24 42
    Q32 38 40 42
    V46
    A4 4 0 0 1 36 50
    H28
    A4 4 0 0 1 24 46
    Z
  "
    fill="url(#chemGrad)"
    opacity="0.9"/>

  <!-- Bubble -->
  <circle cx="37" cy="34" r="2.5"
          fill="#858EF4"
          opacity="0.9"/>

</svg>
