<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <linearGradient id="physicsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85C6F4"/>
      <stop offset="100%" stop-color="#858EF4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="18" fill="#F0F6FF"/>

  <!-- Soft Glow -->
  <circle cx="32" cy="32" r="20"
          fill="rgba(255,255,255,0.45)"/>

  <!-- Atom Rings -->
  <ellipse cx="32" cy="32"
           rx="16" ry="6"
           fill="none"
           stroke="url(#physicsGrad)"
           stroke-width="3"
           opacity="0.95"/>

  <ellipse cx="32" cy="32"
           rx="16" ry="6"
           fill="none"
           stroke="url(#physicsGrad)"
           stroke-width="3"
           opacity="0.95"
           transform="rotate(60 32 32)"/>

  <ellipse cx="32" cy="32"
           rx="16" ry="6"
           fill="none"
           stroke="url(#physicsGrad)"
           stroke-width="3"
           opacity="0.95"
           transform="rotate(-60 32 32)"/>

  <!-- Core -->
  <circle cx="32" cy="32"
          r="5.5"
          fill="url(#physicsGrad)"
          filter="url(#glow)"/>

  <!-- Electrons -->
  <circle cx="48" cy="32"
          r="2.5"
          fill="#FFFFFF"/>

  <circle cx="24" cy="18"
          r="2.5"
          fill="#FFFFFF"/>

  <circle cx="24" cy="46"
          r="2.5"
          fill="#FFFFFF"/>

</svg>
